<!-- Alternative: Load from local file if superhuman.services is down -->
<script>
  // Fallback to local widget if main server fails
  setTimeout(function() {
    if (!window.ServiceBot || !window.ServiceBot.loaded) {
      console.log('Loading local widget connector...');
      var script = document.createElement('script');
      script.src = '/widget-connector.js';
      document.body.appendChild(script);
    }
  }, 3000);
</script>
