name = "atlanta-gutter-guard-pros"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# Environment variables will be set as secrets via wrangler command

[[headers]]
for = "/*"
  [headers.values]
  Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://server.fillout.com https://www.googletagmanager.com https://pagead2.googlesyndication.com https://superhuman.services; frame-src https://server.fillout.com; connect-src 'self' https://api.mistral.ai https://superhuman.services; img-src 'self' data: https:; style-src 'self' 'unsafe-inline';"
